<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store Badges Preview</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .badge-section { padding: 20px; border-radius: 8px; }
    .light { background: #f5f5f5; }
    .dark { background: #1a1a1a; }
    h2 { margin-bottom: 20px; font-size: 14px; }
    .light h2 { color: #333; }
    .dark h2 { color: #fff; }
    img { height: 50px; margin: 10px; }
  </style>
</head>
<body>
  <div class="badge-section light">
    <h2>Light Mode Background</h2>
    <img src="app-store-dark.svg" alt="App Store">
    <img src="google-play-dark.png" alt="Google Play">
  </div>
  <div class="badge-section dark">
    <h2>Dark Mode Background</h2>
    <img src="app-store-light.svg" alt="App Store">
    <img src="google-play-light.svg" alt="Google Play">
  </div>
</body>
</html>
